<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEK - Events & Tickets</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            background: linear-gradient(120deg, rgba(0,255,100,0.18) 0%, rgba(0,255,41,0.22) 100%);
            mix-blend-mode: color;
            z-index: 1;
        }

        * {
            position: relative;
            z-index: 2;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: url('eye.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: #e6e6c7;
            font-family: 'Montserrat', 'Share Tech Mono', 'Orbitron', Arial, sans-serif;
            padding: 0;
        }

        header {
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 1.5px solid #ffe9a7;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            font-size: 1.8em;
            letter-spacing: 0.2em;
            color: #ffe9a7;
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            color: #ffe9a7;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
        }

        nav a:hover {
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41;
        }

        nav a.active {
            color: #00ff41;
            border-bottom: 2px solid #00ff41;
            padding-bottom: 5px;
        }

        .user-info {
            text-align: right;
            font-size: 0.9em;
        }

        .logout-btn {
            padding: 8px 16px;
            border: 1.5px solid #ffe9a7;
            background: transparent;
            color: #ffe9a7;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            margin-top: 10px;
        }

        .logout-btn:hover {
            background: rgba(255, 233, 167, 0.1);
            box-shadow: 0 0 10px #ffe9a7;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            font-size: 2.2em;
            margin-bottom: 40px;
            color: #ffe9a7;
            text-shadow: 0 0 8px #ffe9a7;
            letter-spacing: 0.1em;
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            border-bottom: 2px solid #ffe9a7;
            padding-bottom: 15px;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 24px;
            border: 2px solid #ffe9a7;
            background: transparent;
            color: #ffe9a7;
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            font-size: 1em;
            font-weight: bold;
            letter-spacing: 0.05em;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .tab-btn:hover {
            background: rgba(255, 233, 167, 0.1);
            box-shadow: 0 0 10px #ffe9a7;
        }

        .tab-btn.active {
            background: #00ff41;
            color: #000;
            border-color: #00ff41;
            box-shadow: 0 0 15px #00ff41;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .event-card {
            background: rgba(0, 0, 0, 0.6);
            border: 1.5px solid #ffe9a7;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 233, 167, 0.1);
            display: flex;
            flex-direction: column;
        }

        .event-card:hover {
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 25px rgba(255, 233, 167, 0.3);
            transform: translateY(-5px);
        }

        .event-header {
            background: linear-gradient(135deg, rgba(0, 255, 65, 0.1), rgba(255, 233, 167, 0.1));
            padding: 20px;
            border-bottom: 1px solid rgba(255, 233, 167, 0.2);
        }

        .event-date {
            font-size: 0.85em;
            color: #00ff41;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .event-title {
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            font-size: 1.4em;
            color: #ffe9a7;
            margin: 0;
            letter-spacing: 0.05em;
        }

        .event-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .event-info {
            margin-bottom: 15px;
        }

        .event-info-label {
            font-size: 0.8em;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .event-info-value {
            font-size: 0.95em;
            color: #e6e6c7;
        }

        .event-description {
            color: #a6a67f;
            font-size: 0.9em;
            line-height: 1.5;
            margin-bottom: 20px;
            flex: 1;
        }

        .ticket-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .ticket-btn {
            padding: 10px;
            border: 1.5px solid #ffe9a7;
            background: rgba(0, 0, 0, 0.5);
            color: #ffe9a7;
            font-size: 0.85em;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            text-transform: uppercase;
        }

        .ticket-btn:hover {
            background: #ffe9a7;
            color: #181818;
            box-shadow: 0 0 12px #ffe9a7;
        }

        .ticket-price {
            font-size: 0.75em;
            color: #00ff41;
            font-weight: bold;
        }

        .coming-soon {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px dashed #ffe9a7;
            border-radius: 8px;
            color: #a6a67f;
        }

        .coming-soon h2 {
            color: #ffe9a7;
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            margin-bottom: 10px;
            font-size: 1.6em;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }

            nav {
                flex-direction: column;
                gap: 10px;
            }

            h1 {
                font-size: 1.6em;
            }

            .events-grid {
                grid-template-columns: 1fr;
            }

            .ticket-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">TEK</div>
        <nav>
            <a href="profile.html">PROFILE</a>
            <a href="events.html" class="active">EVENTS</a>
        </nav>
        <div class="user-info">
            <div>Welcome, <span id="userName">Member</span></div>
            <button onclick="logout()" class="logout-btn">LOG OUT</button>
        </div>
    </header>

    <div class="container">
        <h1>EVENTS</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('upcoming')">UPCOMING</button>
            <button class="tab-btn" onclick="switchTab('previous')">PREVIOUS</button>
        </div>

        <div id="upcoming" class="tab-content active">
            <div class="events-grid" id="upcomingContainer">
                <!-- Upcoming events will be loaded here -->
            </div>
        </div>

        <div id="previous" class="tab-content">
            <div class="events-grid" id="previousContainer">
                <!-- Previous events will be loaded here -->
            </div>
        </div>

        <div class="coming-soon">
            <h2>Ticket Sales Coming Soon</h2>
            <p>We're currently setting up the ticketing and payment system. Check back soon to purchase your tickets!</p>
            <p style="font-size: 0.9em; color: #666;">In the meantime, stay tuned for announcements about our upcoming events.</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-functions-compat.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAMMtUtonXEVkPiRmF5SRYw2r97qUQ-yFo",
            authDomain: "tek-nightclub-app.firebaseapp.com",
            projectId: "tek-nightclub-app",
            storageBucket: "tek-nightclub-app.appspot.com",
            messagingSenderId: "501085259012",
            appId: "1:501085259012:web:f29d88121166df82563c51"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.addEventListener('load', async function() {
            const userName = sessionStorage.getItem('userName');
            if (!userName) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userName').textContent = userName;

            try {
                // Ensure user is authenticated
                if (!firebase.auth().currentUser) {
                    console.log('Signing in anonymously...');
                    await firebase.auth().signInAnonymously();
                    console.log('Signed in anonymously');
                }
                await loadEvents();
            } catch (err) {
                console.error('Auth error:', err);
                document.getElementById('upcomingContainer').innerHTML = `<p style="color: #ff6b6b; text-align: center;">Authentication error: ${err.message}</p>`;
            }
        });

        function switchTab(tab) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            // Show selected tab
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        async function loadEvents() {
            const upcomingContainer = document.getElementById('upcomingContainer');
            const previousContainer = document.getElementById('previousContainer');
            
            upcomingContainer.innerHTML = '<p style="color: #ffe9a7; text-align: center;">Loading events...</p>';
            previousContainer.innerHTML = '';

            try {
                console.log('Fetching events from Firestore...');
                const snapshot = await db.collection('events').get();

                console.log('Found', snapshot.docs.length, 'events');

                // Separate events into upcoming and previous
                const now = new Date();
                const events = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                const upcomingEvents = [];
                const previousEvents = [];

                events.forEach(event => {
                    let eventDate = now;
                    if (event.startAt) {
                        eventDate = event.startAt.toDate ? event.startAt.toDate() : new Date(event.startAt);
                    }
                    
                    if (eventDate >= now) {
                        upcomingEvents.push(event);
                    } else {
                        previousEvents.push(event);
                    }
                });

                // Sort both arrays
                upcomingEvents.sort((a, b) => {
                    const aDate = a.startAt?.toDate ? a.startAt.toDate() : new Date(a.startAt);
                    const bDate = b.startAt?.toDate ? b.startAt.toDate() : new Date(b.startAt);
                    return aDate - bDate;
                });

                previousEvents.sort((a, b) => {
                    const aDate = a.startAt?.toDate ? a.startAt.toDate() : new Date(a.startAt);
                    const bDate = b.startAt?.toDate ? b.startAt.toDate() : new Date(b.startAt);
                    return bDate - aDate; // Reverse order for previous
                });

                // Render upcoming events
                if (upcomingEvents.length > 0) {
                    upcomingContainer.innerHTML = '';
                    upcomingEvents.forEach(event => renderEvent(event, upcomingContainer));
                } else {
                    upcomingContainer.innerHTML = '<p style="color: #a6a67f; text-align: center;">No upcoming events. Check back soon!</p>';
                }

                // Render previous events
                if (previousEvents.length > 0) {
                    previousContainer.innerHTML = '';
                    previousEvents.forEach(event => renderEvent(event, previousContainer));
                } else {
                    previousContainer.innerHTML = '<p style="color: #a6a67f; text-align: center;">No previous events yet.</p>';
                }

            } catch (err) {
                console.error('Error loading events:', err);
                console.error('Error code:', err.code);
                console.error('Full error:', JSON.stringify(err));
                upcomingContainer.innerHTML = `<p style="color: #ff6b6b; text-align: center;">Error loading events: ${err.message}</p>`;
            }
        }

        function renderEvent(event, container) {
            console.log('Event:', event);

            // Format date
            let eventDateStr = 'TBA';
            if (event.startAt) {
                const eventDate = event.startAt.toDate ? event.startAt.toDate() : new Date(event.startAt);
                eventDateStr = eventDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            }

            const eventCard = document.createElement('div');
            eventCard.className = 'event-card';
            eventCard.innerHTML = `
                <div class="event-header">
                    <div class="event-date">${eventDateStr}</div>
                    <h2 class="event-title">${event.title || 'Untitled Event'}</h2>
                </div>
                <div class="event-body">
                    <div class="event-info">
                        <div class="event-info-label">LOCATION</div>
                        <div class="event-info-value">${event.location || 'TBA'}</div>
                    </div>
                    <div class="event-description">${event.description || 'More details coming soon!'}</div>
                    <div class="ticket-options">
                        <button onclick="buyTicket('${event.title || 'Event'}', 'General', ${event.price || 25})" class="ticket-btn">
                            GENERAL<br><span class="ticket-price">$${event.price || 25}</span>
                        </button>
                        <button onclick="buyTicket('${event.title || 'Event'}', 'VIP', ${event.vipPrice || (event.price ? Math.round(event.price * 1.5) : 40)})" class="ticket-btn">
                            VIP<br><span class="ticket-price">$${event.vipPrice || (event.price ? Math.round(event.price * 1.5) : 40)}</span>
                        </button>
                    </div>
                </div>
            `;
            container.appendChild(eventCard);
        }

        let stripe = null;

        async function initStripe() {
            if (!stripe) {
                stripe = Stripe('pk_test_51SwOqeEt59uC4oruet9mqqN1SV6WJZp7FftkG5el9AUPqn2NfMu6RfwPOcswBChgf7ZMQg71CNTJSa4UuIjNxyPL00Yb2HIRzm');
                console.log('Stripe initialized');
            }
            return stripe;
        }

        async function buyTicket(eventTitle, ticketType, price) {
            try {
                console.log('Starting ticket purchase for:', eventTitle, ticketType, 'kr' + price);
                
                // Initialize Stripe if not already done
                const stripeInstance = await initStripe();
                if (!stripeInstance) {
                    throw new Error('Failed to initialize Stripe');
                }
                // Show loading
                const loadingDiv = document.createElement('div');
                loadingDiv.id = 'paymentLoading';
                loadingDiv.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000;';
                loadingDiv.innerHTML = '<p style="color: #00ff41; font-size: 1.2em;">Processing payment...</p>';
                document.body.appendChild(loadingDiv);

                // Get current user info
                const userId = sessionStorage.getItem('userId');
                if (!userId) {
                    throw new Error('User not logged in');
                }

                // Clear any stale purchase locks via Cloud Function
                try {
                    const functions = firebase.app().functions('us-central1');
                    const clearLocks = functions.httpsCallable('clearExpiredTicketLocks');
                    const clearResult = await clearLocks();
                    console.log('Cleared expired locks:', clearResult.data.cleared);
                } catch (err) {
                    console.warn('Could not clear stale locks:', err);
                }

                // Find event document ID
                const snapshot = await db.collection('events').get();
                let eventId = null;
                snapshot.docs.forEach(doc => {
                    if (doc.data().title === eventTitle) {
                        eventId = doc.id;
                    }
                });

                if (!eventId) {
                    throw new Error('Event not found');
                }

                console.log('Found event ID:', eventId);

                // Call Cloud Function to create payment intent
                const functions = firebase.app().functions('us-central1');
                const createIntent = functions.httpsCallable('createEventTicketPaymentIntent');
                
                const createResult = await createIntent({
                    eventId: eventId,
                    quantity: 1
                });

                console.log('Full payment intent result:', JSON.stringify(createResult.data, null, 2));
                console.log('Currency from result:', createResult.data.currency);
                console.log('Amount:', createResult.data.amount);
                console.log('Payment intent result:', createResult.data);

                const isFree = createResult.data.free === true;
                
                if (isFree) {
                    // Free ticket - just finalize
                    const finalize = functions.httpsCallable('finalizeEventTicketPurchase');
                    await finalize({
                        eventId: eventId,
                        quantity: 1,
                        free: true
                    });
                    
                    document.getElementById('paymentLoading').remove();
                    alert(`Ticket secured for ${eventTitle}!\n\nYour ${ticketType} ticket is ready.`);
                    return;
                }

                const clientSecret = createResult.data.clientSecret;
                const paymentIntentId = createResult.data.paymentIntentId;

                if (!clientSecret || !paymentIntentId) {
                    throw new Error('Missing payment information from server');
                }

                console.log('Got client secret, creating payment element');

                // Remove loading and show payment element
                document.getElementById('paymentLoading').remove();

                // Create a modal for payment
                const modal = document.createElement('div');
                modal.id = 'paymentModal';
                modal.style.cssText = `
                    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                    background: rgba(0,0,0,0.9); display: flex; justify-content: center; 
                    align-items: center; z-index: 1001; padding: 20px;
                `;
                modal.innerHTML = `
                    <div style="background: #1a1a1a; border: 2px solid #ffe9a7; border-radius: 8px; 
                                padding: 30px; width: 100%; max-width: 500px; color: #e6e6c7;">
                        <h2 style="color: #ffe9a7; margin-top: 0; font-family: Orbitron;">Payment</h2>
                        <p style="font-size: 0.9em; color: #a6a67f; margin-bottom: 20px;">${eventTitle} - ${ticketType} - ${price} kr</p>
                        <div id="payment-element"></div>
                        <div id="payment-message" style="color: #ff6b6b; margin: 15px 0; min-height: 20px;"></div>
                        <button id="payment-submit" 
                                style="width: 100%; padding: 12px; background: #00ff41; color: #000; border: none; 
                                       border-radius: 4px; font-weight: bold; cursor: pointer; font-family: Orbitron; margin-top: 10px;">
                            Pay ${price} kr
                        </button>
                        <button onclick="cancelPayment()" 
                                style="width: 100%; padding: 12px; background: transparent; color: #ffe9a7; 
                                       border: 1.5px solid #ffe9a7; border-radius: 4px; margin-top: 10px; 
                                       cursor: pointer; font-family: Orbitron;">
                            Cancel
                        </button>
                    </div>
                `;
                document.body.appendChild(modal);

                // Create elements with dark appearance
                const appearance = {
                    theme: 'dark',
                    variables: {
                        colorPrimary: '#00ff41',
                        colorBackground: '#1a1a1a',
                        colorText: '#e6e6c7',
                        colorDanger: '#ff6b6b',
                        fontFamily: 'Montserrat, system-ui, -apple-system, sans-serif',
                        borderRadius: '4px',
                        spacingUnit: '8px'
                    }
                };

                console.log('Creating Stripe elements with clientSecret:', clientSecret);
                
                // Declare variables outside try block so they're accessible to submit button
                let elements, paymentElement;
                
                try {
                    // Create elements - with clientSecret, Stripe knows it's a payment
                    elements = stripeInstance.elements({
                        clientSecret: clientSecret,
                        appearance: appearance
                    });
                    console.log('Elements created successfully');

                    // Wait a moment for DOM to be ready
                    await new Promise(resolve => setTimeout(resolve, 100));
                    
                    // Check if container exists
                    const container = document.getElementById('payment-element');
                    if (!container) {
                        throw new Error('Payment element container not found in DOM');
                    }
                    console.log('Payment container found:', container);

                    paymentElement = elements.create('payment');
                    console.log('Payment element created');
                    
                    paymentElement.mount('#payment-element');
                    console.log('Payment element mounted successfully');

                } catch (err) {
                    console.error('Error creating/mounting payment element:', err);
                    document.getElementById('payment-message').textContent = `Setup error: ${err.message}`;
                    throw err;
                }

                // Handle form submission
                const submitBtn = document.getElementById('payment-submit');
                
                submitBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Processing...';
                    
                    try {
                        console.log('Starting payment confirmation with elements:', elements);
                        const result = await stripeInstance.confirmPayment({
                            elements,
                            confirmParams: {
                                return_url: window.location.href
                            },
                            redirect: 'if_required'
                        });

                        console.log('Payment result:', result);
                        if (result.error) {
                            throw new Error(result.error.message);
                        }

                        // Payment successful - finalize
                        console.log('Payment succeeded, finalizing ticket purchase');
                        const finalize = functions.httpsCallable('finalizeEventTicketPurchase');
                        await finalize({
                            eventId: eventId,
                            quantity: 1,
                            free: false,
                            paymentIntentId: paymentIntentId
                        });

                        document.getElementById('paymentModal').remove();
                        alert(`Ticket secured for ${eventTitle}!\n\nYour ${ticketType} ticket is ready. Check your email for details.`);

                    } catch (err) {
                        console.error('Payment error:', err);
                        document.getElementById('payment-message').textContent = `Error: ${err.message}`;
                        submitBtn.disabled = false;
                        submitBtn.textContent = `Pay ${price} kr`;
                    }
                });

                window.currentPaymentData = {
                    eventId: eventId,
                    ticketType: ticketType,
                    eventTitle: eventTitle,
                    paymentIntentId: paymentIntentId
                };

            } catch (err) {
                console.error('Payment setup error:', err);
                const loadingDiv = document.getElementById('paymentLoading');
                if (loadingDiv) loadingDiv.remove();
                alert(`Payment setup failed: ${err.message}`);
            }
        }

        function cancelPayment() {
            const modal = document.getElementById('paymentModal');
            if (modal) modal.remove();
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
