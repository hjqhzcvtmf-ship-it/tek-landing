<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEK - Events & Tickets</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            background: linear-gradient(120deg, rgba(0,255,100,0.18) 0%, rgba(0,255,41,0.22) 100%);
            mix-blend-mode: color;
            z-index: 1;
        }

        * {
            position: relative;
            z-index: 2;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: url('eye.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: #e6e6c7;
            font-family: 'Montserrat', 'Share Tech Mono', 'Orbitron', Arial, sans-serif;
            padding: 0;
            overflow-x: hidden;
        }

        .bg-video {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 0 !important;
            pointer-events: none;
        }

        header {
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 1.5px solid #ffe9a7;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            font-size: 1.8em;
            letter-spacing: 0.2em;
            color: #ffe9a7;
        }

        nav {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        nav a {
            color: #ffe9a7;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
        }

        nav a:hover {
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41;
        }

        nav a.active {
            color: #00ff41;
            border-bottom: 2px solid #00ff41;
            padding-bottom: 5px;
        }

        .user-info {
            text-align: right;
            font-size: 0.9em;
            max-width: 220px;
        }

        .logout-btn {
            padding: 8px 16px;
            border: 1.5px solid #ffe9a7;
            background: transparent;
            color: #ffe9a7;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            margin-top: 10px;
        }

        .logout-btn:hover {
            background: rgba(255, 233, 167, 0.1);
            box-shadow: 0 0 10px #ffe9a7;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            font-size: 2.2em;
            margin-bottom: 40px;
            color: #ffe9a7;
            text-shadow: 0 0 8px #ffe9a7;
            letter-spacing: 0.1em;
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            border-bottom: 2px solid #ffe9a7;
            padding-bottom: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            border: 2px solid #ffe9a7;
            background: transparent;
            color: #ffe9a7;
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            font-size: 1em;
            font-weight: bold;
            letter-spacing: 0.05em;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .tab-btn:hover {
            background: rgba(255, 233, 167, 0.1);
            box-shadow: 0 0 10px #ffe9a7;
        }

        .tab-btn.active {
            background: #00ff41;
            color: #000;
            border-color: #00ff41;
            box-shadow: 0 0 15px #00ff41;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .event-card {
            background: rgba(0, 0, 0, 0.6);
            border: 1.5px solid #ffe9a7;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 233, 167, 0.1);
            display: flex;
            flex-direction: column;
        }

        .event-card:hover {
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 25px rgba(255, 233, 167, 0.3);
            transform: translateY(-5px);
        }

        .event-header {
            background: linear-gradient(135deg, rgba(0, 255, 65, 0.1), rgba(255, 233, 167, 0.1));
            padding: 20px;
            border-bottom: 1px solid rgba(255, 233, 167, 0.2);
        }

        .event-date {
            font-size: 0.85em;
            color: #00ff41;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .event-title {
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            font-size: 1.4em;
            color: #ffe9a7;
            margin: 0;
            letter-spacing: 0.05em;
            word-break: break-word;
        }

        .event-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .event-info {
            margin-bottom: 15px;
        }

        .event-info-label {
            font-size: 0.8em;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .event-info-value {
            font-size: 0.95em;
            color: #e6e6c7;
            overflow-wrap: anywhere;
        }

        .event-description {
            color: #a6a67f;
            font-size: 0.9em;
            line-height: 1.5;
            margin-bottom: 20px;
            flex: 1;
            overflow-wrap: anywhere;
        }

        .ticket-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .ticket-btn {
            padding: 10px;
            border: 1.5px solid #ffe9a7;
            background: rgba(0, 0, 0, 0.5);
            color: #ffe9a7;
            font-size: 0.85em;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            text-transform: uppercase;
        }

        .ticket-btn:hover {
            background: #ffe9a7;
            color: #181818;
            box-shadow: 0 0 12px #ffe9a7;
        }

        .ticket-price {
            font-size: 0.75em;
            color: #00ff41;
            font-weight: bold;
        }

        .coming-soon {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px dashed #ffe9a7;
            border-radius: 8px;
            color: #a6a67f;
        }

        .coming-soon h2 {
            color: #ffe9a7;
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            margin-bottom: 10px;
            font-size: 1.6em;
        }

        @media (max-width: 768px) {
            header {
                padding: 18px 20px;
                flex-wrap: wrap;
                gap: 16px;
                align-items: flex-start;
            }

            nav {
                gap: 18px;
                width: 100%;
                order: 2;
            }

            .user-info {
                order: 3;
                width: 100%;
                max-width: none;
                text-align: left;
            }

            .container {
                padding: 24px 16px 40px;
            }

            h1 {
                font-size: 1.6em;
                margin-bottom: 24px;
            }

            .tabs {
                gap: 12px;
                margin-bottom: 24px;
                padding-bottom: 12px;
            }

            .tab-btn {
                flex: 1 1 140px;
                width: 100%;
            }

            .events-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .ticket-options {
                grid-template-columns: 1fr;
            }

            .event-header,
            .event-body {
                padding: 16px;
            }

            .coming-soon {
                display: none;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 16px;
            }

            .logo {
                font-size: 1.25em;
                letter-spacing: 0.14em;
            }

            nav a {
                font-size: 0.82em;
            }

            .logout-btn {
                width: 100%;
                text-align: center;
            }

            .tab-btn {
                padding: 12px 16px;
                font-size: 0.9em;
            }

            .event-title {
                font-size: 1.15em;
            }
        }
    </style>
</head>
<body>
    <video class="bg-video" autoplay muted loop playsinline>
        <source src="eye.mp4" type="video/mp4">
    </video>

    <header>
        <div class="logo">TEK</div>
        <nav>
            <a href="profile.html">PROFILE</a>
            <a href="events.html" class="active">EVENTS</a>
            <a href="tickets.html">MY TICKETS</a>
        </nav>
        <div class="user-info">
            <div>Welcome, <span id="userName">Member</span></div>
            <button onclick="logout()" class="logout-btn">LOG OUT</button>
        </div>
    </header>

    <div class="container">
        <h1>EVENTS</h1>
        <div id="checkoutStatus" style="display:none; margin: 0 0 20px; padding: 14px 16px; border-radius: 8px; border: 1.5px solid #ffe9a7; background: rgba(0,0,0,0.72);"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('upcoming', this)">UPCOMING</button>
            <button class="tab-btn" onclick="switchTab('previous', this)">PREVIOUS</button>
        </div>

        <div id="upcoming" class="tab-content active">
            <div class="events-grid" id="upcomingContainer">
                <!-- Upcoming events will be loaded here -->
            </div>
        </div>

        <div id="previous" class="tab-content">
            <div class="events-grid" id="previousContainer">
                <!-- Previous events will be loaded here -->
            </div>
        </div>

        <div class="coming-soon">
            <h2>Tickets Available Online</h2>
            <p>You can now reserve event tickets directly from this page using secure Stripe Checkout.</p>
            <p style="font-size: 0.9em; color: #666;">Choose an upcoming event above, tap GET TICKET, and you’ll be redirected to complete payment securely.</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-functions-compat.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="tek-analytics.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAMMtUtonXEVkPiRmF5SRYw2r97qUQ-yFo",
            authDomain: "tek-nightclub-app.firebaseapp.com",
            projectId: "tek-nightclub-app",
            storageBucket: "tek-nightclub-app.firebasestorage.app",
            messagingSenderId: "501085259012",
            appId: "1:501085259012:web:f29d88121166df82563c51"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function setCheckoutStatus(type, message) {
            const statusEl = document.getElementById('checkoutStatus');
            if (!statusEl) return;

            const styles = {
                success: { border: '#00ff41', text: '#00ff41' },
                error: { border: '#ff6b6b', text: '#ff9a9a' },
                info: { border: '#ffe9a7', text: '#ffe9a7' }
            };
            const style = styles[type] || styles.info;

            statusEl.style.display = 'block';
            statusEl.style.borderColor = style.border;
            statusEl.style.color = style.text;
            statusEl.textContent = message;
        }

        function clearCheckoutQueryParams() {
            const url = new URL(window.location.href);
            ['checkout', 'session_id', 'event_id'].forEach((key) => url.searchParams.delete(key));
            window.history.replaceState({}, document.title, url.toString());
        }

        async function handleCheckoutReturn() {
            const params = new URLSearchParams(window.location.search);
            const checkoutState = params.get('checkout');
            if (!checkoutState) return;

            if (checkoutState === 'cancel') {
                console.log('Stripe Checkout was canceled by the user');
                if (window.trackWebsiteEvent) {
                    window.trackWebsiteEvent('ticket_checkout_canceled', { page: 'events' });
                }
                setCheckoutStatus('info', 'Checkout canceled. No charge was made. You can try again anytime.');
                clearCheckoutQueryParams();
                return;
            }

            const sessionId = params.get('session_id');
            if (!sessionId) {
                setCheckoutStatus('error', 'Checkout returned without a session reference. Please try again.');
                clearCheckoutQueryParams();
                return;
            }

            try {
                setCheckoutStatus('info', 'Verifying your payment and ticket...');
                const functions = firebase.app().functions('us-central1');
                const getStatus = functions.httpsCallable('getEventTicketCheckoutStatus');
                const appId = localStorage.getItem('userId');
                const result = await getStatus({ sessionId, appId });
                const data = result.data || {};
                console.log('Stripe Checkout return status:', data);

                if (data.status === 'paid') {
                    if (window.trackWebsiteEvent) {
                        window.trackWebsiteEvent('ticket_checkout_paid', { page: 'events' });
                    }
                    setCheckoutStatus(
                        'success',
                        data.ticketReady
                            ? 'Payment confirmed. Your ticket is ready and should appear in your account shortly.'
                            : 'Payment confirmed. We are finishing your ticket now; refresh in a moment if it does not appear.'
                    );
                } else if (data.status === 'expired') {
                    setCheckoutStatus('error', 'This checkout session expired before payment completed. Please try again.');
                } else {
                    setCheckoutStatus('error', `Checkout status: ${data.status || 'unknown'} (${data.paymentStatus || 'no payment status'}).`);
                }
            } catch (err) {
                console.error('Checkout status verification failed:', err);
                setCheckoutStatus('error', `We couldn't verify the checkout result automatically. If you were charged, your ticket should appear on the My Tickets page shortly. You can also try refreshing.`);
            } finally {
                clearCheckoutQueryParams();
            }
        }

        window.addEventListener('load', async function() {
            const userName = localStorage.getItem('userName');
            if (!userName) {
                window.location.href = 'login.html';
                return;
            }

            if (window.trackWebsiteEvent) {
                window.trackWebsiteEvent('page_view', { page: 'events' });
            }

            document.getElementById('userName').textContent = userName;

            try {
                // Ensure user is authenticated
                if (!firebase.auth().currentUser) {
                    console.log('Signing in anonymously...');
                    await firebase.auth().signInAnonymously();
                    console.log('Signed in anonymously');
                }
                await handleCheckoutReturn();
                await loadEvents();
            } catch (err) {
                console.error('Auth error:', err);
                document.getElementById('upcomingContainer').innerHTML = `<p style="color: #ff6b6b; text-align: center;">Authentication error: ${err.message}</p>`;
            }
        });

        function switchTab(tab, buttonEl) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            // Show selected tab
            document.getElementById(tab).classList.add('active');
            if (buttonEl) {
                buttonEl.classList.add('active');
            }
        }

        async function loadEvents() {
            const upcomingContainer = document.getElementById('upcomingContainer');
            const previousContainer = document.getElementById('previousContainer');
            
            upcomingContainer.innerHTML = '<p style="color: #ffe9a7; text-align: center;">Loading events...</p>';
            previousContainer.innerHTML = '';

            try {
                console.log('Fetching events from Firestore...');
                const snapshot = await db.collection('events').get();

                console.log('Found', snapshot.docs.length, 'events');

                // Separate events into upcoming and previous
                const now = new Date();
                const events = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                const upcomingEvents = [];
                const previousEvents = [];

                events.forEach(event => {
                    let eventDate = now;
                    if (event.startAt) {
                        eventDate = event.startAt.toDate ? event.startAt.toDate() : new Date(event.startAt);
                    }
                    
                    if (eventDate >= now) {
                        upcomingEvents.push(event);
                    } else {
                        previousEvents.push(event);
                    }
                });

                // Sort both arrays
                upcomingEvents.sort((a, b) => {
                    const aDate = a.startAt?.toDate ? a.startAt.toDate() : new Date(a.startAt);
                    const bDate = b.startAt?.toDate ? b.startAt.toDate() : new Date(b.startAt);
                    return aDate - bDate;
                });

                previousEvents.sort((a, b) => {
                    const aDate = a.startAt?.toDate ? a.startAt.toDate() : new Date(a.startAt);
                    const bDate = b.startAt?.toDate ? b.startAt.toDate() : new Date(b.startAt);
                    return bDate - aDate; // Reverse order for previous
                });

                // Render upcoming events
                if (upcomingEvents.length > 0) {
                    upcomingContainer.innerHTML = '';
                    upcomingEvents.forEach(event => renderEvent(event, upcomingContainer));
                } else {
                    upcomingContainer.innerHTML = '<p style="color: #a6a67f; text-align: center;">No upcoming events. Check back soon!</p>';
                }

                // Render previous events
                if (previousEvents.length > 0) {
                    previousContainer.innerHTML = '';
                    previousEvents.forEach(event => renderEvent(event, previousContainer));
                } else {
                    previousContainer.innerHTML = '<p style="color: #a6a67f; text-align: center;">No previous events yet.</p>';
                }

            } catch (err) {
                console.error('Error loading events:', err);
                console.error('Error code:', err.code);
                console.error('Full error:', JSON.stringify(err));
                upcomingContainer.innerHTML = `<p style="color: #ff6b6b; text-align: center;">Error loading events: ${err.message}</p>`;
            }
        }

        function renderEvent(event, container) {
            console.log('Event:', event);

            // Format date
            let eventDateStr = 'TBA';
            if (event.startAt) {
                const eventDate = event.startAt.toDate ? event.startAt.toDate() : new Date(event.startAt);
                eventDateStr = eventDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            }

            const eventPrice = Number(event.price || 0);
            const currency = (event.currency || 'sek').toString().toUpperCase();
            const priceLabel = eventPrice <= 0
                ? 'FREE'
                : `${Number.isInteger(eventPrice) ? eventPrice : eventPrice.toFixed(2)} ${currency}`;

            const eventCard = document.createElement('div');
            eventCard.className = 'event-card';
            eventCard.innerHTML = `
                <div class="event-header">
                    <div class="event-date">${eventDateStr}</div>
                    <h2 class="event-title">${event.title || 'Untitled Event'}</h2>
                </div>
                <div class="event-body">
                    <div class="event-info">
                        <div class="event-info-label">LOCATION</div>
                        <div class="event-info-value">${event.location || 'TBA'}</div>
                    </div>
                    <div class="event-description">${event.description || 'More details coming soon!'}</div>
                    <div class="ticket-options">
                        <button onclick="buyTicket('${event.title || 'Event'}', ${eventPrice})" class="ticket-btn">
                            GET TICKET<br><span class="ticket-price">${priceLabel}</span>
                        </button>
                    </div>
                </div>
            `;
            container.appendChild(eventCard);
        }

        let stripe = null;

        async function initStripe() {
            if (!stripe) {
                stripe = Stripe('pk_live_51SwOqDImSVvLBf0s0gSYsHitOvEJekzTqqBKCMQFkxsr50VFIf2IF7bcPuzfFSE3ohAg4IOqmWAInaD6yIRe2ahS00GCdLj6oP');
                console.log('Stripe initialized');
            }
            return stripe;
        }

        async function buyTicket(eventTitle, price) {
            try {
            console.log('Starting ticket purchase for:', eventTitle, 'price', price);
                setCheckoutStatus('info', `Preparing secure checkout for ${eventTitle}...`);
                
                // Initialize Stripe if not already done
                const stripeInstance = await initStripe();
                if (!stripeInstance) {
                    throw new Error('Failed to initialize Stripe');
                }
                // Show loading
                const loadingDiv = document.createElement('div');
                loadingDiv.id = 'paymentLoading';
                loadingDiv.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000;';
                loadingDiv.innerHTML = '<p style="color: #00ff41; font-size: 1.2em;">Processing payment...</p>';
                document.body.appendChild(loadingDiv);

                // Get current user info
                const userId = localStorage.getItem('userId');
                if (!userId) {
                    throw new Error('User not logged in');
                }

                // Clear any stale purchase locks via Cloud Function
                try {
                    const functions = firebase.app().functions('us-central1');
                    const clearLocks = functions.httpsCallable('clearExpiredTicketLocks');
                    const clearResult = await clearLocks();
                    console.log('Cleared expired locks:', clearResult.data.cleared);
                } catch (err) {
                    console.warn('Could not clear stale locks:', err);
                }

                // Find event document ID
                const snapshot = await db.collection('events').get();
                let eventId = null;
                snapshot.docs.forEach(doc => {
                    if (doc.data().title === eventTitle) {
                        eventId = doc.id;
                    }
                });

                if (!eventId) {
                    throw new Error('Event not found');
                }

                console.log('Found event ID:', eventId);
                if (window.trackWebsiteEvent) {
                    window.trackWebsiteEvent('ticket_checkout_started', {
                        page: 'events',
                        eventId: eventId,
                        eventTitle: eventTitle
                    });
                }

                // Call Cloud Function to create payment intent
                const functions = firebase.app().functions('us-central1');
                const createCheckout = functions.httpsCallable('createEventTicketCheckoutSession');
                
                const createResult = await createCheckout({
                    eventId: eventId,
                    quantity: 1,
                    pageUrl: window.location.href,
                    appId: userId
                });

                console.log('Stripe Checkout session result:', createResult.data);

                const isFree = createResult.data.free === true;
                
                if (isFree) {
                    // Free ticket - just finalize
                    const finalize = functions.httpsCallable('finalizeEventTicketPurchase');
                    await finalize({
                        eventId: eventId,
                        quantity: 1,
                        free: true,
                        appId: userId
                    });
                    if (window.trackWebsiteEvent) {
                        window.trackWebsiteEvent('ticket_free_claimed', { page: 'events', eventId: eventId, eventTitle: eventTitle });
                    }
                    
                    document.getElementById('paymentLoading').remove();
                    alert(`Ticket secured for ${eventTitle}!\n\nYour ticket is ready.`);
                    return;
                }

                const checkoutUrl = createResult.data.url;
                const checkoutSessionId = createResult.data.sessionId;

                if (!checkoutUrl && !checkoutSessionId) {
                    throw new Error('Missing Stripe Checkout session information from server');
                }

                setCheckoutStatus('info', 'Redirecting to Stripe Checkout...');
                document.getElementById('paymentLoading').remove();

                if (checkoutUrl) {
                    window.location.assign(checkoutUrl);
                    return;
                }

                const redirectResult = await stripeInstance.redirectToCheckout({
                    sessionId: checkoutSessionId
                });
                if (redirectResult.error) {
                    throw new Error(redirectResult.error.message);
                }

            } catch (err) {
                console.error('Payment setup error:', err);
                const loadingDiv = document.getElementById('paymentLoading');
                if (loadingDiv) loadingDiv.remove();
                setCheckoutStatus('error', `Payment setup failed: ${err.message}`);
                alert(`Payment setup failed: ${err.message}`);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>

<!-- Refer a Friend floating button -->
<script src="refer-friend.js"></script>
</body>
</html>
