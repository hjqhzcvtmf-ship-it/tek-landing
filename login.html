<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEK - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            background: linear-gradient(120deg, rgba(0,255,100,0.18) 0%, rgba(0,255,41,0.22) 100%);
            mix-blend-mode: color;
            z-index: 1;
        }

        .container, h1, .login-form, .back-btn {
            position: relative;
            z-index: 2;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: url('eye.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: #e6e6c7;
            font-family: 'Montserrat', 'Share Tech Mono', 'Orbitron', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-shadow: 0 1px 8px #1a1a1a, 0 0 2px #000;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 18px;
            border: 1.5px solid #ffe9a7;
            background: transparent;
            color: #ffe9a7;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            z-index: 10;
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
        }

        .back-btn:hover {
            background: rgba(255, 233, 167, 0.1);
            box-shadow: 0 0 12px #ffe9a7;
        }

        .container {
            padding: 48px 32px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            font-size: 2.5em;
            margin: 0 0 10px 0;
            letter-spacing: 0.2em;
            color: #ffe9a7;
            text-shadow: 0 1px 8px #1a1a1a, 0 0 8px #ffe9a7;
        }

        .subtitle {
            font-size: 0.9em;
            margin-bottom: 2em;
            color: #a6a67f;
            letter-spacing: 0.05em;
        }

        .login-form {
            background: rgba(0, 0, 0, 0.6);
            border: 1.5px solid #ffe9a7;
            border-radius: 8px;
            padding: 2em;
            box-shadow: 0 0 20px rgba(255, 233, 167, 0.2);
        }

        .form-group {
            margin-bottom: 1.5em;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85em;
            font-weight: 700;
            color: #ffe9a7;
            margin-bottom: 0.5em;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        input[type="email"],
        input[type="text"] {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #ffe9a7;
            border-radius: 6px;
            color: #e6e6c7;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.95em;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="email"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 233, 167, 0.5);
            background: rgba(0, 0, 0, 0.9);
        }

        input::placeholder {
            color: #666;
        }

        .button-group {
            display: flex;
            gap: 1em;
            margin-top: 2em;
        }

        .login-btn-submit,
        .signup-link {
            flex: 1;
            padding: 0.8em 1.5em;
            border: 1.5px solid #ffe9a7;
            background: rgba(0, 0, 0, 0.5);
            color: #ffe9a7;
            text-decoration: none;
            font-size: 0.95em;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-btn-submit:hover {
            background: #ffe9a7;
            color: #181818;
            box-shadow: 0 0 16px #ffe9a7;
        }

        .signup-link:hover {
            background: rgba(255, 233, 167, 0.1);
            box-shadow: 0 0 12px #ffe9a7;
        }

        .error {
            color: #ff6b6b;
            font-size: 0.85em;
            margin-top: 0.5em;
            display: none;
        }

        .success {
            color: #00ff41;
            font-size: 0.85em;
            margin-top: 0.5em;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            color: #ffe9a7;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ffe9a7;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← BACK</a>
    <div class="container">
        <h1>LOG IN</h1>
        <p class="subtitle">Enter your referral code to access your account</p>

        <div class="login-form">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
                </div>

                <div class="form-group">
                    <label for="referralCode">Referral Code</label>
                    <input type="text" id="referralCode" name="referralCode" placeholder="Your referral code from email" required>
                    <small style="color: #999; font-size: 0.85em; margin-top: 0.3em; display: block;">You received this in the approval email</small>
                </div>

                <div id="errorMsg" class="error"></div>
                <div id="successMsg" class="success"></div>

                <div class="button-group">
                    <button type="submit" class="login-btn-submit">
                        <span id="buttonText">LOG IN</span>
                        <div class="loading" id="loading">
                            <div class="spinner"></div>
                            LOGGING IN...
                        </div>
                    </button>
                    <a href="membership.html" class="signup-link">APPLY</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAMMtUtonXEVkPiRmF5SRYw2r97qUQ-yFo",
            authDomain: "tek-nightclub-app.firebaseapp.com",
            projectId: "tek-nightclub-app",
            storageBucket: "tek-nightclub-app.appspot.com",
            messagingSenderId: "501085259012",
            appId: "1:501085259012:web:f29d88121166df82563c51"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function showError(message) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMsg');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const referralCode = document.getElementById('referralCode').value.trim();

            if (!email || !referralCode) {
                showError('Please fill in all fields');
                return;
            }

            // Show loading state
            document.getElementById('buttonText').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.querySelector('.login-btn-submit').disabled = true;

            try {
                // Sign in anonymously if needed
                if (!auth.currentUser) {
                    await auth.signInAnonymously();
                }

                // Query Firestore for user with matching email and referral code
                const userQuery = await db.collection('applications')
                    .where('email', '==', email)
                    .where('referralCode', '==', referralCode)
                    .limit(1)
                    .get();

                if (userQuery.empty) {
                    showError('Invalid email or referral code. Please check and try again.');
                    document.getElementById('buttonText').style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                    document.querySelector('.login-btn-submit').disabled = false;
                    return;
                }

                const userData = userQuery.docs[0].data();
                
                // Check if application is approved
                if (userData.status !== 'approved') {
                    showError('Your application is still under review. Please check your email for updates.');
                    document.getElementById('buttonText').style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                    document.querySelector('.login-btn-submit').disabled = false;
                    return;
                }

                // Successful login - store session and redirect to tickets page
                sessionStorage.setItem('userEmail', email);
                sessionStorage.setItem('referralCode', referralCode);
                sessionStorage.setItem('userName', userData.name);
                sessionStorage.setItem('userId', userQuery.docs[0].id);

                showSuccess('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'tickets.html';
                }, 1500);

            } catch (error) {
                console.error('Login error:', error);
                showError('An error occurred. Please try again.');
                document.getElementById('buttonText').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                document.querySelector('.login-btn-submit').disabled = false;
            }
        });
    </script>
</body>
</html>
