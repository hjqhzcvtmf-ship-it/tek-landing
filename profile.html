<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEK - Your Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            background: linear-gradient(120deg, rgba(0,255,100,0.18) 0%, rgba(0,255,41,0.22) 100%);
            mix-blend-mode: color;
            z-index: 1;
        }

        * {
            position: relative;
            z-index: 2;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: url('eye.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: #e6e6c7;
            font-family: 'Montserrat', 'Share Tech Mono', 'Orbitron', Arial, sans-serif;
            padding: 0;
        }

        header {
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 1.5px solid #ffe9a7;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            font-size: 1.8em;
            letter-spacing: 0.2em;
            color: #ffe9a7;
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            color: #ffe9a7;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
        }

        nav a:hover {
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41;
        }

        nav a.active {
            color: #00ff41;
            border-bottom: 2px solid #00ff41;
            padding-bottom: 5px;
        }

        .user-info {
            text-align: right;
            font-size: 0.9em;
        }

        .logout-btn {
            padding: 8px 16px;
            border: 1.5px solid #ffe9a7;
            background: transparent;
            color: #ffe9a7;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            margin-top: 10px;
        }

        .logout-btn:hover {
            background: rgba(255, 233, 167, 0.1);
            box-shadow: 0 0 10px #ffe9a7;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .profile-header {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 40px;
            margin-bottom: 50px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.5);
            border: 1.5px solid #ffe9a7;
            border-radius: 8px;
        }

        .profile-image {
            width: 200px;
            height: 200px;
            border-radius: 8px;
            border: 2px solid #ffe9a7;
            object-fit: cover;
            background: rgba(0, 0, 0, 0.8);
        }

        .profile-image.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: #ffe9a7;
        }

        .profile-info h1 {
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            font-size: 2em;
            color: #ffe9a7;
            margin: 0 0 20px 0;
            letter-spacing: 0.05em;
        }

        .profile-field {
            margin-bottom: 15px;
        }

        .profile-label {
            font-size: 0.85em;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: bold;
        }

        .profile-value {
            font-size: 1.1em;
            color: #e6e6c7;
            margin-top: 4px;
        }

        .bio-text {
            color: #a6a67f;
            line-height: 1.6;
            font-style: italic;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .stat {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            color: #00ff41;
            font-weight: bold;
            font-family: 'Share Tech Mono', monospace;
        }

        .stat-label {
            font-size: 0.85em;
            color: #999;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .section-title {
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            font-size: 1.6em;
            color: #ffe9a7;
            margin: 40px 0 20px 0;
            letter-spacing: 0.05em;
            border-bottom: 2px solid #ffe9a7;
            padding-bottom: 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 20px;
            border: 1.5px solid #ffe9a7;
            background: rgba(0, 0, 0, 0.5);
            color: #ffe9a7;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
            text-transform: uppercase;
            text-align: center;
            display: block;
        }

        .btn:hover {
            background: #ffe9a7;
            color: #181818;
            box-shadow: 0 0 15px #ffe9a7;
        }

        .btn.primary {
            border-color: #00ff41;
            color: #00ff41;
        }

        .btn.primary:hover {
            background: rgba(0, 255, 65, 0.2);
            box-shadow: 0 0 15px #00ff41;
            color: #00ff41;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">TEK</div>
        <nav>
            <a href="profile.html" class="active">PROFILE</a>
            <a href="events.html">EVENTS</a>
        </nav>
        <div class="user-info">
            <div>Welcome, <span id="userName">Member</span></div>
            <button onclick="logout()" class="logout-btn">LOG OUT</button>
        </div>
    </header>

    <div class="container">
        <div class="profile-header">
            <div id="profileImageContainer" class="profile-image placeholder">👤</div>
            <div class="profile-info">
                <h1 id="profileName">Your Name</h1>
                
                <div class="profile-field">
                    <div class="profile-label">Email</div>
                    <div class="profile-value" id="profileEmail">email@example.com</div>
                </div>

                <div class="profile-field">
                    <div class="profile-label">Phone</div>
                    <div class="profile-value" id="profilePhone">+1 (555) 555-5555</div>
                </div>

                <div class="profile-field">
                    <div class="profile-label">Instagram</div>
                    <div class="profile-value" id="profileInstagram">@username</div>
                </div>

                <div class="profile-field">
                    <div class="profile-label">Bio</div>
                    <div class="profile-value bio-text" id="profileBio">Your bio goes here</div>
                </div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="xpPoints">0</div>
                        <div class="stat-label">XP Points</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="friendCount">0</div>
                        <div class="stat-label">Friends</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-title">MEMBER STATUS</div>
        <div class="buttons">
            <a href="events.html" class="btn primary">VIEW EVENTS</a>
            <a href="events.html" class="btn">BUY TICKETS</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAMMtUtonXEVkPiRmF5SRYw2r97qUQ-yFo",
            authDomain: "tek-nightclub-app.firebaseapp.com",
            projectId: "tek-nightclub-app",
            storageBucket: "tek-nightclub-app.appspot.com",
            messagingSenderId: "501085259012",
            appId: "1:501085259012:web:f29d88121166df82563c51"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.addEventListener('load', async function() {
            const userData = sessionStorage.getItem('userData');
            const userId = sessionStorage.getItem('userId');
            const userName = sessionStorage.getItem('userName');

            if (!userData || !userId) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const user = JSON.parse(userData);
                
                // Update header and profile name
                document.getElementById('userName').textContent = user.name || 'Member';
                document.getElementById('profileName').textContent = user.name || 'Your Name';
                document.getElementById('profileEmail').textContent = user.email || 'email@example.com';
                document.getElementById('profilePhone').textContent = user.phone || '+1 (555) 555-5555';
                document.getElementById('profileInstagram').textContent = user.instagram || '@username';

                // Load profile image if exists
                if (user.profileImageUrl) {
                    const imgContainer = document.getElementById('profileImageContainer');
                    imgContainer.innerHTML = '';
                    const img = document.createElement('img');
                    img.src = user.profileImageUrl;
                    img.className = 'profile-image';
                    imgContainer.appendChild(img);
                }

                // Fetch live data from Firestore (xpPoints, friends, updated bio)
                console.log('Fetching live data for user:', userId);
                const docSnapshot = await db.collection('applications').doc(userId).get();
                
                if (docSnapshot.exists) {
                    const liveData = docSnapshot.data();
                    console.log('Live user data:', liveData);
                    
                    // Update with live data
                    document.getElementById('profileBio').textContent = liveData.bio || 'Your bio goes here';
                    document.getElementById('xpPoints').textContent = liveData.xpPoints || '0';
                    document.getElementById('friendCount').textContent = (liveData.friends ? liveData.friends.length : 0);
                } else {
                    // Fallback to session data if document doesn't exist
                    document.getElementById('profileBio').textContent = user.bio || 'Your bio goes here';
                    document.getElementById('xpPoints').textContent = user.xpPoints || '0';
                    document.getElementById('friendCount').textContent = (user.friends ? user.friends.length : 0);
                }
            } catch (e) {
                console.error('Error loading profile:', e);
                // Fallback to session data on error
                const user = JSON.parse(sessionStorage.getItem('userData'));
                document.getElementById('profileBio').textContent = user.bio || 'Your bio goes here';
                document.getElementById('xpPoints').textContent = user.xpPoints || '0';
                document.getElementById('friendCount').textContent = (user.friends ? user.friends.length : 0);
            }
        });

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
